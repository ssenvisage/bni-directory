<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <title>BNI Referral Success Team – The Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════ */
    :root {
      /* Fonts */
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui:      'Inter', system-ui, sans-serif;

      /* Core palette */
      --crimson:        #9B1B30;
      --rose:           #c77780;
      --navy:           #1B3A57;
      --blush:          #f7eced;
      --stone:          #f5f0ef;
      --ink:            #2a1f20;
      --mid:            #6b5b5d;
      --body-text:      #555555;
      --border-card:    #e8dede;
      --border-logo:    #f0dada;

      /* Shadows */
      --shadow-hover:   rgba(155, 27, 48, 0.12);

      /* Hero overlays */
      --circle-lg:      rgba(255, 255, 255, 0.07);
      --circle-sm:      rgba(255, 255, 255, 0.05);
      --rule-alpha:     rgba(255, 255, 255, 0.25);
      --text-hero-sub:  rgba(255, 255, 255, 0.55);
      --text-motto:     rgba(255, 255, 255, 0.82);

      /* Toolbar / filter strip */
      --border-tab:     rgba(255, 255, 255, 0.10);
      --border-btn:     rgba(255, 255, 255, 0.15);
      --text-btn:       rgba(255, 255, 255, 0.55);
      --bg-search:      rgba(255, 255, 255, 0.08);
      --border-search:  rgba(255, 255, 255, 0.14);
      --text-placeholder: rgba(255, 255, 255, 0.38);

      /* Contact column */
      --text-contact:   rgba(255, 255, 255, 0.72);
      --text-footer:    rgba(255, 255, 255, 0.40);
    }

    body {
      font-family: var(--font-ui);
      background: var(--stone);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════
       HERO HEADER
    ══════════════════════════════════════════ */
    .hero {
      background: var(--crimson);
      position: relative;
      overflow: hidden;
      padding: 0;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -70px; right: -90px;
      width: 360px; height: 360px;
      border-radius: 50%;
      background: var(--circle-lg);
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -50px; left: -50px;
      width: 230px; height: 230px;
      border-radius: 50%;
      background: var(--circle-sm);
    }

    .hero-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.8rem 2rem 0;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      gap: 2rem;
    }

    .hero-brand {
      display: flex;
      align-items: center;
      gap: 1.3rem;
      padding-bottom: 2.5rem;
    }

    .hero-brand img {
      height: 50px;
      filter: brightness(0) invert(1);
    }

    .brand-rule {
      width: 1px;
      height: 46px;
      background: var(--rule-alpha);
    }

    .brand-words h1 {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 3vw, 2.1rem);
      font-weight: 600;
      color: white;
      line-height: 1.15;
    }

    .brand-words p {
      font-size: 0.8rem;
      color: var(--text-hero-sub);
      margin-top: 0.2rem;
      letter-spacing: 0.05em;
    }

    .hero-right {
      margin-left: auto;
      padding-bottom: 2.5rem;
      text-align: right;
    }

    .motto {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.6rem;
      color: var(--text-motto);
    }

    /* ══════════════════════════════════════════
       FILTER + SEARCH STRIP
    ══════════════════════════════════════════ */
    .hero-tab {
      background: var(--navy);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }

    .tab-label {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--stone);
      letter-spacing: 0.14em;
      padding: 0.85rem 1.2rem 0.85rem 0;
      border-right: 1px solid var(--border-tab);
      margin-right: 0.9rem;
      white-space: nowrap;
    }

    .filters {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      padding: 0.55rem 0;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border-btn);
      color: var(--text-btn);
      font-size: 0.74rem;
      padding: 0.28rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--crimson);
      border-color: var(--crimson);
      color: white;
    }

    .tab-search {
      margin-left: auto;
      padding: 0.55rem 0;
    }

    .tab-search input {
      background: var(--bg-search);
      border: 1px solid var(--border-search);
      border-radius: 5px;
      padding: 0.38rem 0.9rem;
      color: white;
      font-family: var(--font-ui);
      font-size: 0.81rem;
      width: 220px;
    }

    .tab-search input::placeholder { color: var(--text-placeholder); }
    .tab-search input:focus { outline: none; border-color: var(--rose); }

    /* ══════════════════════════════════════════
       MAIN
    ══════════════════════════════════════════ */
    .main {
      max-width: 1020px;
      margin: 2.5rem auto 5rem;
      padding: 0 1.5rem;
      width: 100%;
      flex: 1;
    }

    .member-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .status-card {
      background: white;
      border: 1px solid var(--border-card);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      color: var(--mid);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .status-card.error {
      border-color: rgba(155, 27, 48, 0.24);
      color: var(--crimson);
      background: #fff9fa;
    }

    /* ══════════════════════════════════════════
       MEMBER ROW CARD
    ══════════════════════════════════════════ */
    .mcard {
      --card-accent-width: 4px;
      --card-logo-size: 70px;
      --card-body-pad-left: 20px;
      background: white;
      border-radius: 10px;
      border: 1px solid var(--border-card);
      display: grid;
      grid-template-columns: 96px 1fr 270px;
      overflow: hidden;
      position: relative;
      transition: box-shadow 0.2s;
    }

    .mcard::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: var(--card-accent-width);
      background: var(--navy);
      z-index: 1;
    }

    .mcard:hover {
      box-shadow: 0 6px 26px var(--shadow-hover);
    }

    /* Logo column */
    .mcard-logo {
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 0 18px;
    }

    .logo-box {
      width: var(--card-logo-size);
      height: var(--card-logo-size);
      border-radius: 9px;
      background: white;
      border: 1.5px solid var(--border-logo);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transform: translateX(calc((var(--card-accent-width) + var(--card-body-pad-left)) / 2));
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-initial {
      display: none; /* shown via onerror when no logo is set */
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 600;
      color: var(--rose);
      line-height: 1;
    }

    /* Content column */
    .mcard-body {
      padding: 18px 16px 18px var(--card-body-pad-left);
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .mcard-body .name {
      font-family: var(--font-display);
      font-size: 1.18rem;
      font-weight: 600;
      color: var(--ink);
    }

    .mcard-body .profession {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .mcard-body .company {
      font-size: 0.84rem;
      color: var(--mid);
      font-style: italic;
    }

    .mcard-body .bio {
      font-size: 0.85rem;
      color: var(--body-text);
      line-height: 1.62;
      margin-top: 0.45rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-height: 2.8rem;
      transition: max-height 0.35s ease-out;
    }

    .mcard.expanded .mcard-body .bio {
      -webkit-line-clamp: unset;
      line-clamp: unset;
      max-height: 12rem;
    }

    .bio-toggle {
      background: none;
      border: none;
      padding: 0;
      margin-top: 0.3rem;
      align-self: flex-start;
      font-family: var(--font-ui);
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--crimson);
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .bio-toggle:hover { color: var(--rose); }

    .cat-tag {
      display: inline-block;
      align-self: flex-start;
      background: var(--blush);
      color: var(--crimson);
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* Contact column */
    .mcard-contact {
      background: var(--navy);
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.5rem;
      min-width: 270px;
      overflow: hidden;
    }

    .mcard-contact > a,
    .mcard-contact > span {
      font-size: 0.78rem;
      color: var(--text-contact);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .mcard-contact svg {
      flex-shrink: 0;
    }

    .contact-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .mcard-contact a:hover { color: var(--rose); }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .hero-inner { padding: 1.8rem 1.2rem 0; }
      .hero-right { display: none; }

      .hero-tab { padding: 0 1.2rem; }
      .tab-search { width: 100%; margin-left: 0; padding-bottom: 0.7rem; }
      .tab-search input { width: 100%; }

      .mcard {
        grid-template-columns: 1fr;
        max-height: none;
        transition: box-shadow 0.2s;
      }

      .mcard-logo {
        padding: 1rem 1.2rem;
        flex-direction: row;
        justify-content: flex-start;
        gap: 0.8rem;
      }

      .mcard-contact {
        min-width: unset;
        overflow: visible;
      }

      .mcard-contact .contact-text {
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
      }
    }

    /* ── FOOTER ── */
    footer {
      background: var(--ink);
      color: var(--text-footer);
      text-align: center;
      padding: 1.8rem;
      font-size: 0.78rem;
      margin-top: auto;
    }

    footer a { color: var(--rose); text-decoration: none; margin-right: 1rem; }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-brand">
      <img src="https://www.bni.com/wp-content/uploads/2024/09/BNI_logo.png" alt="BNI" onerror="this.style.display='none'" />
      <div class="brand-rule"></div>
      <div class="brand-words">
        <h1>BNI Referral<br>Success Team</h1>
        <p>Hudson Valley Chapter &mdash; Member Directory</p>
      </div>
    </div>
    <div class="hero-right">
      <div class="motto">Givers Gain.</div>
    </div>
  </div>

  <div class="hero-tab">
    <span class="tab-label">Filter</span>
    <div class="filters" id="filters"></div>
    <div class="tab-search">
      <input type="text" id="search" placeholder="Search members…" oninput="filterCards()" />
    </div>
  </div>
</div>

<main class="main">
  <div class="member-list" id="grid">
  </div>
</main>

<footer>
  BNI Referral Success Team &bull; Hudson Valley Chapter &bull; 2026
</footer>

<script src="./members-data.js"></script>
<script>
  const DEFAULT_MEMBERS = [
    {
      name: 'Jane Smith',
      profession: 'Financial Advisor',
      company: 'Smith Wealth Management',
      category: 'Finance',
      bio: 'Jane helps families and small business owners build long-term financial plans. 20+ years in personal finance; certified CFP. Passionate about financial literacy in the Hudson Valley community.',
      phone: '(555) 123-4567',
      officePhone: '',
      email: 'jane@smithwealth.com',
      website: 'https://www.smithwealth.com',
      logoUrl: ''
    },
    {
      name: 'Marcus Rivera',
      profession: 'General Contractor',
      company: 'Rivera Construction LLC',
      category: 'Construction',
      bio: 'Licensed general contractor specializing in residential remodels and commercial fit-outs. Serving the Hudson Valley for 15 years. Free estimates; insured and bonded.',
      phone: '(555) 987-6543',
      officePhone: '',
      email: 'marcus@riveraconstruction.com',
      website: 'https://www.riveraconstruction.com',
      logoUrl: ''
    },
    {
      name: 'Priya Nair',
      profession: 'Marketing Consultant',
      company: 'Nair Digital Studio',
      category: 'Marketing',
      bio: 'Helps local businesses grow their online presence through SEO, social media, and paid ads. Former agency director; now works directly with Hudson Valley small business owners.',
      phone: '(555) 246-8101',
      officePhone: '',
      email: 'priya@nairdigital.com',
      website: 'https://www.nairdigital.com',
      logoUrl: ''
    }
  ];

  const state = {
    members: [],
    activeCategory: 'all'
  };

  function slugify(value) {
    return (value || 'uncategorized')
      .toString()
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'uncategorized';
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatWebsite(value) {
    if (!value) return '';
    return value.replace(/^https?:\/\//i, '').replace(/\/$/, '');
  }

  function normalizeWebsite(value) {
    if (!value) return '';
    return /^https?:\/\//i.test(value) ? value : `https://${value}`;
  }

  function phoneHref(value) {
    return `tel:${String(value || '').replace(/[^\d+]/g, '')}`;
  }

  function getInitials(name) {
    const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
    return parts.slice(0, 2).map(part => part[0]).join('').toUpperCase() || '?';
  }

  function showStatus(message, type = '') {
    const grid = document.getElementById('grid');
    grid.innerHTML = `<div class="status-card ${type}">${escapeHtml(message)}</div>`;
  }

  function sortMembers(members) {
    return [...members].sort((a, b) => (a.name || '').localeCompare(b.name || '', undefined, { sensitivity: 'base' }));
  }

  function renderFilters() {
    const filters = document.getElementById('filters');
    const categories = [...new Set(state.members.map(member => member.category).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    const allCategories = ['all', ...categories];

    filters.innerHTML = allCategories.map(category => {
      const label = category === 'all' ? 'All' : category;
      const isActive = state.activeCategory === slugify(category) || (category === 'all' && state.activeCategory === 'all');
      const categoryValue = category === 'all' ? 'all' : slugify(category);
      return `<button class="filter-btn${isActive ? ' active' : ''}" data-category="${escapeHtml(categoryValue)}">${escapeHtml(label)}</button>`;
    }).join('');

    filters.querySelectorAll('.filter-btn').forEach(button => {
      button.addEventListener('click', () => {
        state.activeCategory = button.dataset.category;
        renderFilters();
        filterCards();
      });
    });
  }

  function renderCards() {
    const grid = document.getElementById('grid');

    if (!state.members.length) {
      showStatus('No members were found in the generated directory data.', 'error');
      return;
    }

    grid.innerHTML = state.members.map(member => {
      const categorySlug = slugify(member.category);
      const website = normalizeWebsite(member.website);
      const officePhone = member.officePhone && member.officePhone !== member.phone ? member.officePhone : '';

      return `
        <div class="mcard" data-cat="${escapeHtml(categorySlug)}">
          <div class="mcard-logo">
            <div class="logo-box">
              <img src="${escapeHtml(member.logoUrl)}" alt="${escapeHtml(member.company || member.name)} logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'" ${member.logoUrl ? '' : 'style="display:none"'} />
              <div class="logo-initial" style="${member.logoUrl ? '' : 'display:flex'}">${escapeHtml(getInitials(member.name))}</div>
            </div>
          </div>
          <div class="mcard-body">
            <div class="name">${escapeHtml(member.name)}</div>
            <div class="profession">${escapeHtml(member.profession)}</div>
            <div class="company">${escapeHtml(member.company)}</div>
            <span class="cat-tag">${escapeHtml(member.category)}</span>
            <div class="bio">${escapeHtml(member.bio)}</div>
            <button class="bio-toggle">more</button>
          </div>
          <div class="mcard-contact">
            ${member.phone ? `<a href="${escapeHtml(phoneHref(member.phone))}"><svg width="14" height="14"><use href="#icon-phone"/></svg><span class="contact-text">${escapeHtml(member.phone)}</span></a>` : ''}
            ${officePhone ? `<a href="${escapeHtml(phoneHref(officePhone))}"><svg width="14" height="14"><use href="#icon-office-phone"/></svg><span class="contact-text">${escapeHtml(officePhone)}</span></a>` : ''}
            ${member.email ? `<a href="mailto:${escapeHtml(member.email)}"><svg width="14" height="14"><use href="#icon-mail"/></svg><span class="contact-text">${escapeHtml(member.email)}</span></a>` : ''}
            ${website ? `<a href="${escapeHtml(website)}" target="_blank" rel="noreferrer"><svg width="14" height="14"><use href="#icon-globe"/></svg><span class="contact-text">${escapeHtml(formatWebsite(website))}</span></a>` : ''}
          </div>
        </div>
      `;
    }).join('');

    initializeBioToggles();
    filterCards();
  }

  function filterCards() {
    const q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.mcard').forEach(c => {
      const matchesSearch = c.textContent.toLowerCase().includes(q);
      const matchesCategory = state.activeCategory === 'all' || c.dataset.cat === state.activeCategory;
      c.style.display = matchesSearch && matchesCategory ? '' : 'none';
    });
  }

  function checkTruncation(btn) {
    const bio = btn.previousElementSibling;
    const card = btn.closest('.mcard');
    const wasExpanded = card.classList.contains('expanded');

    if (wasExpanded) card.classList.remove('expanded');
    const truncated = bio.scrollHeight > bio.clientHeight + 1;
    if (wasExpanded) card.classList.add('expanded');

    btn.hidden = !truncated;
    if (!truncated && wasExpanded) {
      card.classList.remove('expanded');
      btn.textContent = 'more';
    }
  }

  function initializeBioToggles() {
    document.querySelectorAll('.bio-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const card = btn.closest('.mcard');
        const expanded = card.classList.toggle('expanded');
        btn.textContent = expanded ? 'less' : 'more';
      });
      checkTruncation(btn);
    });
  }

  function loadMembers() {
    const generatedMembers = Array.isArray(window.BNI_DIRECTORY_DATA) ? window.BNI_DIRECTORY_DATA : [];
    state.members = sortMembers(generatedMembers.length ? generatedMembers : DEFAULT_MEMBERS);
    renderFilters();
    renderCards();
  }

  document.fonts.ready.then(() => {
    loadMembers();

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        document.querySelectorAll('.bio-toggle').forEach(checkTruncation);
      }, 150);
    });
  });
</script>

</body>
</html>
